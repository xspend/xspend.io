<!DOCTYPE html>
<html>

<body
  style="font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f6f7f9; margin: 0; padding: 32px 0;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0"
          style="background: #ffffff; border-radius: 8px; padding: 32px;">
          <tr>
            <td>
              <h2 style="margin: 0 0 16px; color: #111827;">Your login code</h2>
              <p style="color: #4b5563; line-height: 1.5;">
                Use this code to finish logging in to xspend. It expires in 2 minutes.
              </p>
              <p style="text-align: center; margin: 32px 0;">
                <span style="display: inline-block; background: #f3f4f6; color: #111827;
                             padding: 16px 28px; border-radius: 6px; font-size: 28px;
                             font-weight: 700; letter-spacing: 6px;">
                  {{ otp }}
                </span>
              </p>
              <p style="color: #9ca3af; font-size: 13px;">
                If you didn't try to log in, you can ignore this email — someone likely
                mistyped their email address.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
